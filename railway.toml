[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.migrate"

[[services]]
name = "migrate"
source = "."
dockerfilePath = "Dockerfile.migrate"
startCommand = "node -e \"process.exit(0)\""

[[services]]
name = "auth"
source = "."
dockerfilePath = "services/auth/Dockerfile"
startCommand = "node services/auth/src/index.js"
healthcheckPath = "/health"

  [services.variables]
  AUTH_PORT = "3001"

[[services]]
name = "gateway"
source = "."
dockerfilePath = "services/api-gateway/Dockerfile"
startCommand = "node services/api-gateway/src/index.js"
healthcheckPath = "/health"

  [services.variables]
  GATEWAY_PORT = "${{RAILWAY_PUBLIC_DOMAIN}}"

[[services]]
name = "qs"
source = "."
dockerfilePath = "portals/qs/Dockerfile"
startCommand = "node portals/qs/backend/index.js"
healthcheckPath = "/health"

  [services.variables]
  QS_PORT = "3005"

